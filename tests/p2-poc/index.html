<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>p2-poc three.js triangle</title>
  <style>
    body { margin: 0; background: #222; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="c" width="400" height="300"></canvas>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";

    // Use existing canvas to be sure 400x300 sticks
    const canvas = document.getElementById("c");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
    renderer.setSize(400, 300, false);
    renderer.setClearColor(0x102040, 1);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, 400 / 300, 0.1, 100);
    camera.position.z = 3;

    // One static triangle, hand-rolled geometry
    const geometry = new THREE.BufferGeometry();
    const verts = new Float32Array([
       0.0,  1.0, 0.0,
      -1.0, -1.0, 0.0,
       1.0, -1.0, 0.0
    ]);
    geometry.setAttribute("position", new THREE.BufferAttribute(verts, 3));
    const material = new THREE.MeshBasicMaterial({ color: 0xff5500 });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    function step() { renderer.render(scene, camera); requestAnimationFrame(step); }
    requestAnimationFrame(step);

    // Long-running so external snapshot has time; the harness pkills
    // chromium when the wait window expires.
    setTimeout(() => { try { window.close(); } catch (_) {} }, 8000);
  </script>
</body>
</html>
